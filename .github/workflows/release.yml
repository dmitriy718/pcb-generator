name: Package and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            script: package:linux
          - platform: windows
            os: windows-latest
            script: package:win
          - platform: macos
            os: macos-latest
            script: package:mac
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - name: Package application
        run: npm run ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@v6
        with:
          name: pcb-enclosure-generator-${{ matrix.platform }}
          path: release/**
          if-no-files-found: error

  github-release:
    name: Publish GitHub release
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mapfile -d '' files < <(find artifacts -type f -print0)
          gh release create "$TAG_NAME" \
            --title "PCB Enclosure Generator $TAG_NAME" \
            --generate-notes \
            "${files[@]}"
